baseURL = 'https://cetyler.github.io/'
languageCode = 'en-us'
title = 'Christopher Tyler'
author = "Christopher Tyler"
copyright = "Copyright © 2026, Christopher Tyler."

theme = 'hugo-bearblog'

sectionPagesMenu = 'main'

enableRobotsTXT = true
enableGitInfo = true
defaultContentLanguage = "en"

[params]
  goatcounter = "badc0unt45"
  # By enabling this feature each blog post will have at the end a navigator
  enablePostNavigator = true

[params.footer]
  enable = true
  displayCopyright = true
  displayPoweredBy = true
  width = 'normal'

[params.blog.list]
  displayTags = true
  sortBy = 'date'
  sortOrder = 'desc' # or "asc"

[related]
  includeNewer = true
  threshold = 20
  toLower = false
  [[related.indices]]
    applyFilter = true
    name = 'fragmentrefs'
    type = 'fragments'
    weight = 80

[taxonomies]
  tag = "tags"
  series = "series"

[languages.en]
  languageName = "English"
  weight = 1
  title = "Christopher Tyler"

[security]
  [security.exec]
  allow = ['^micro$','^vim','^nano','^git']

[markup]
  [markup.highlight]
#    style = 'friendly'
    lineNos = true
#    lineNumbersInTable = false
    codeFences = true
